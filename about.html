<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nós — TrackerSaas</title>
    <meta name="description" content="Conheça a visão por trás do TrackerSaas — a tecnologia que humaniza a gestão residencial de encomendas.">
    <link rel="icon" href="assets/hero/tracker-logo.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:title" content="Sobre Nós — TrackerSaas">
    <meta property="og:description" content="A tecnologia que humaniza a gestão residencial de encomendas.">
    <meta property="og:image" content="assets/hero/hero-bg.jpeg">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script defer src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="preload" as="image" href="assets/hero/hero-bg.jpeg">
</head>

<body class="preloading">
    <!-- Components will be injected here by components.js -->
    <div class="main-wrapper">
        <main class="main-content transition-fade" id="swup">
            <!-- Video Hero Section -->
            <section class="about-hero">
                <div class="about-hero-inner">
                    <div class="about-header-reveal">
                        <span class="about-tag">Nossa Visão</span>
                        <h1 class="about-title">A tecnologia que humaniza a <span class="hs-dark">gestão
                                residencial.</span></h1>
                    </div>

                    <div class="video-container-wrapper">
                        <div class="video-container">
                            <div class="video-placeholder">
                                <iconify-icon icon="solar:play-circle-bold" width="64"></iconify-icon>
                                <span>Vídeo Institucional — Em breve</span>
                            </div>
                            <!-- Replace placeholder with: <video src="assets/about/institutional.mp4" autoplay muted loop playsinline></video> -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Large Carousel Section -->
            <section class="about-carousel-section">
                <div class="carousel-container">
                    <div class="carousel-header">
                        <h2 class="carousel-title">Por que o <span class="hs-dark">TrackerSaas?</span></h2>
                        <div class="carousel-nav">
                            <button class="nav-btn prev"><iconify-icon
                                    icon="solar:arrow-left-linear"></iconify-icon></button>
                            <button class="nav-btn next"><iconify-icon
                                    icon="solar:arrow-right-linear"></iconify-icon></button>
                        </div>
                    </div>

                    <div class="swiper features-swiper">
                        <div class="swiper-wrapper">
                            <!-- Slide 1 -->
                            <div class="swiper-slide feature-card empty-card"></div>
                            <!-- Slide 2 -->
                            <div class="swiper-slide feature-card empty-card"></div>
                            <!-- Slide 3 -->
                            <div class="swiper-slide feature-card empty-card"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Footer and Modal injected by components.js -->

    <script src="js/components.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/swup@4"></script>
    <script src="js/main.js"></script>
</body>

</html>
